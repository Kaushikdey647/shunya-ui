# Railway config-as-code — https://docs.railway.com/config-as-code
#
# Environment (Railway → Variables):
#   • VITE_API_BASE — full URL of the FastAPI backend (e.g. https://your-api.up.railway.app).
#     Vite inlines this at *build* time; change it → trigger a new deploy so the bundle rebuilds.
#   • Dev uses `VITE_API_BASE=/api` with the Vite proxy; production needs the real API origin
#     and CORS enabled on the Python service.
#
# JSON schema (VS Code / editors): https://railway.com/railway.schema.json

[build]
builder = "RAILPACK"
# Railpack runs `npm ci` in the install phase; do not run `npm ci` again here — a second
# `npm ci` often hits `EBUSY` removing `node_modules/.vite` on overlay filesystems.
buildCommand = "npm run build"

[deploy]
# Do not use `vite preview` here: Vite is a devDependency and Railpack's `npm ci`
# omits dev deps in production — nothing listens on $PORT and healthchecks fail.
# `serve` is a runtime dependency; `-s` enables SPA fallback (static files like /healthz win).
startCommand = "npm run start"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
